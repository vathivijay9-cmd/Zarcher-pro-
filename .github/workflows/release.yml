name: Android Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK) 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Local Environment Config
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi

    - name: Prepare Signing Keystore
      run: |
        # If the user has not placed a custom release key, generate a safe self-signed keystore
        # to ensure that the Gradle release task runs cleanly without crashing the pipeline.
        if [ ! -f "my-upload-key.jks" ]; then
          echo "No custom my-upload-key.jks found. Generating a temporary self-signed keystore..."
          keytool -genkey -v \
            -keystore my-upload-key.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=HelloAndroidStarter, OU=AIStudioBuild, O=AIStudio, L=MountainView, S=California, C=US" \
            -storepass "android_fallback_password" \
            -keypass "android_fallback_password"
          
          # Set safe environment fallbacks for the Gradle build step
          echo "STORE_PASSWORD=android_fallback_password" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android_fallback_password" >> $GITHUB_ENV
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/my-upload-key.jks" >> $GITHUB_ENV
        fi

    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x gradlew

    - name: Build Debug and Release Packages
      env:
        # Pass variables securely. GHA will use either user-provided secrets or the fallback envs configured above.
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || env.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || env.KEY_PASSWORD }}
        KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH || env.KEYSTORE_PATH }}
      run: |
        ./gradlew assembleDebug assembleRelease

    - name: Verify Built Artifacts
      run: |
        echo "Verifying compilations..."
        ls -la app/build/outputs/apk/debug/
        ls -la app/build/outputs/apk/release/

    - name: Create GitHub Release Draft
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        prerelease: false
        generate_release_notes: true
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
